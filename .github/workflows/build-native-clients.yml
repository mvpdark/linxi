name: Build Native Clients

on:
  push:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
      - '.github/workflows/build-native-clients.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
      - '.github/workflows/build-native-clients.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: lingxi-clients

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-android-debug
          path: lingxi-clients/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (if secrets available)
        if: env.LINGXI_KEYSTORE_BASE64 != ''
        env:
          LINGXI_KEYSTORE_BASE64: ${{ secrets.LINGXI_KEYSTORE_BASE64 }}
          LINGXI_KEYSTORE_PASSWORD: ${{ secrets.LINGXI_KEYSTORE_PASSWORD }}
          LINGXI_KEY_ALIAS: ${{ secrets.LINGXI_KEY_ALIAS }}
          LINGXI_KEY_PASSWORD: ${{ secrets.LINGXI_KEY_PASSWORD }}
        run: |
          echo "$LINGXI_KEYSTORE_BASE64" | base64 -d > /tmp/lingxi.keystore
          export LINGXI_KEYSTORE_PATH=/tmp/lingxi.keystore
          ./gradlew :androidApp:assembleRelease

      - name: Upload Release APK
        if: env.LINGXI_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-android-release
          path: lingxi-clients/androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

  build-desktop:
    name: Build Desktop MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build Desktop MSI
        run: ./gradlew :desktopApp:packageReleaseMsi
        shell: bash

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-msi
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Build Desktop Exe (portable)
        run: ./gradlew :desktopApp:packageReleaseExe
        shell: bash

      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-exe
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/exe/*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish to GitHub Releases
    needs: [build-android, build-desktop]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # 复制并重命名 APK (debug)
          if [ -d artifacts/lingxi-android-debug ]; then
            cp artifacts/lingxi-android-debug/*.apk release-assets/lingxi-android-debug.apk 2>/dev/null && echo "✓ Debug APK" || echo "✗ No APK in lingxi-android-debug"
          else
            echo "✗ artifacts/lingxi-android-debug not found"
          fi

          # 复制并重命名 MSI
          if [ -d artifacts/lingxi-desktop-msi ]; then
            cp artifacts/lingxi-desktop-msi/*.msi release-assets/lingxi-desktop.msi 2>/dev/null && echo "✓ Desktop MSI" || echo "✗ No MSI in lingxi-desktop-msi"
          else
            echo "✗ artifacts/lingxi-desktop-msi not found"
          fi

          # 复制并重命名 EXE
          if [ -d artifacts/lingxi-desktop-exe ]; then
            cp artifacts/lingxi-desktop-exe/*.exe release-assets/lingxi-desktop-portable.exe 2>/dev/null && echo "✓ Desktop EXE" || echo "✗ No EXE in lingxi-desktop-exe"
          else
            echo "✗ artifacts/lingxi-desktop-exe not found"
          fi

          # 如果有 Release APK 也加上
          if [ -d artifacts/lingxi-android-release ]; then
            cp artifacts/lingxi-android-release/*.apk release-assets/lingxi-android-release.apk 2>/dev/null && echo "✓ Release APK" || true
          fi

          echo "=== Release assets ==="
          ls -la release-assets/

          # 验证至少有一个文件
          if [ -z "$(ls -A release-assets/ 2>/dev/null)" ]; then
            echo "ERROR: No release assets found!"
            exit 1
          fi

      - name: Generate release tag
        id: tag
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v1.0.0-dev.${DATE}.${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "灵犀 Native Client ${{ steps.tag.outputs.tag }}" \
            --notes "## 自动构建发布

          **Commit:** ${{ github.sha }}
          **构建时间:** $(date -u '+%Y-%m-%d %H:%M UTC')

          ### 下载说明
          - **Android**: 下载 \`lingxi-android-debug.apk\`，允许安装未知来源后安装
          - **Windows 安装版**: 下载 \`lingxi-desktop.msi\`，双击安装
          - **Windows 便携版**: 下载 \`lingxi-desktop-portable.exe\`，无需安装直接运行

          > 这是开发版本，可能存在不稳定因素。" \
            --prerelease \
            release-assets/*
