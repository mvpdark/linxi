          onnx_files = [f for f in files if f.startswith('onnx/') and f.endswith(('.onnx', '.onnx_data'))]
          print(f'Found ONNX files: {onnx_files}')
          for f in onnx_files:
            if 'fp16' in f:
              print(f'Downloading {f}...')
              path = hf_hub_download(repo, f)
              basename = os.path.basename(f)
              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_fp16.onnx' if basename.endswith('.onnx') else 'vision_encoder_fp16.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_fp16.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_fp16.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Build Desktop DMG (Apple Silicon)
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-dmg-arm64
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-desktop-macos-intel:
    name: Build Desktop DMG (Intel)
    if: false  # 暂时禁用 Intel DMG，macos-13 runner 资源紧张排队过久
    runs-on: macos-13
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download EdgeTAM-ONNX model (fp16)
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import hf_hub_download, list_repo_files
          import os, shutil
          repo = 'onnx-community/EdgeTAM-ONNX'
          out = 'lingxi-clients/desktopApp/resources/models/edgetam'
