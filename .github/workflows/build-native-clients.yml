              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_fp16.onnx' if basename.endswith('.onnx') else 'vision_encoder_fp16.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_fp16.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_fp16.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Build Desktop DMG (Intel)
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-dmg-x64
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS Framework
    if: false  # 暂时禁用，iOS P0 代码保留待 macOS 环境调试
    runs-on: macos-latest
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework (shared + iosApp)
        run: |
          # 编译 shared 模块的 iOS Arm64 release framework
          ./gradlew :shared:linkReleaseFrameworkIosArm64
          # 编译 iosApp 模块的 iOS Arm64 release framework
          ./gradlew :iosApp:linkReleaseFrameworkIosArm64

      - name: Prepare iOS framework artifact
        run: |
          mkdir -p release-assets
          # 将 ComposeApp.framework 打包为 zip
          cd shared/build/bin/iosArm64/releaseFramework
          zip -ry "$GITHUB_WORKSPACE/lingxi-clients/release-assets/lingxi-ios-framework-v1.0.${{ github.run_number }}.zip" ComposeApp.framework
          cd "$GITHUB_WORKSPACE/lingxi-clients"
          echo "iOS framework zip:"
          ls -la release-assets/

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-ios-framework
          path: lingxi-clients/release-assets/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish to GitHub Releases
    needs: [build-android, build-desktop, build-desktop-macos-arm64, build-desktop-macos-intel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          VERSION="v1.0.${{ github.run_number }}"

          # 递归查找文件（upload-artifact 保留了完整路径结构，文件在深层子目录）
          copy_asset() {
            local artifact_dir="$1"
            local pattern="$2"
            local output_name="$3"
            local label="$4"

            if [ ! -d "$artifact_dir" ]; then
              echo "✗ $label: directory $artifact_dir not found"
              return 0
            fi

            local found_file
            found_file=$(find "$artifact_dir" -name "$pattern" -type f | head -1)
            if [ -n "$found_file" ]; then
              cp "$found_file" "release-assets/$output_name"
              local size_mb
              size_mb=$(du -m "release-assets/$output_name" | cut -f1)
              echo "✓ $label: $output_name (${size_mb} MB) ← $(basename "$found_file")"
            else
              echo "✗ $label: no $pattern found in $artifact_dir"
              # Debug: show what's actually in the directory
              echo "  Contents:"
              find "$artifact_dir" -type f | head -5 | while read -r f; do
                echo "    $f"
              done
            fi
          }

          copy_asset "artifacts/lingxi-android-release" "*.apk" "lingxi-android-${VERSION}.apk" "Release APK"
          copy_asset "artifacts/lingxi-desktop-msi" "*.msi" "lingxi-desktop-${VERSION}.msi" "Desktop MSI"
          copy_asset "artifacts/lingxi-desktop-exe" "*.exe" "lingxi-desktop-portable-${VERSION}.exe" "Desktop EXE"
          copy_asset "artifacts/lingxi-desktop-dmg-arm64" "*.dmg" "lingxi-desktop-macos-arm64-${VERSION}.dmg" "macOS ARM64 DMG"
          copy_asset "artifacts/lingxi-desktop-dmg-x64" "*.dmg" "lingxi-desktop-macos-x64-${VERSION}.dmg" "macOS Intel DMG"
          copy_asset "artifacts/lingxi-ios-framework" "*.zip" "lingxi-ios-framework-${VERSION}.zip" "iOS Framework"

          echo "=== Release assets ==="
          ls -la release-assets/

          # 验证至少有 APK + MSI（其他可选）
          asset_count=$(ls -1 release-assets/ 2>/dev/null | wc -l)
          if [ "$asset_count" -lt 2 ]; then
            echo "ERROR: Expected at least 2 assets (APK + MSI), got $asset_count"
            exit 1
          fi

      - name: Generate release tag
        id: tag
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "灵犀 Native Client ${{ steps.tag.outputs.tag }}" \
            --notes "## 自动构建发布

          **Commit:** ${{ github.sha }}
          **构建时间:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **版本号:** ${{ github.run_number }}

          ### 下载说明
          - **Android**: 下载 \`lingxi-android-v1.0.${{ github.run_number }}.apk\`，允许安装未知来源后安装
          - **Windows 安装版**: 下载 \`lingxi-desktop-v1.0.${{ github.run_number }}.msi\`，双击安装
          - **Windows 便携版**: 下载 \`lingxi-desktop-portable-v1.0.${{ github.run_number }}.exe\`，无需安装直接运行
          - **macOS Apple Silicon (M1/M2/M3/M4)**: 下载 \`lingxi-desktop-macos-arm64-v1.0.${{ github.run_number }}.dmg\`
          - **macOS Intel**: 下载 \`lingxi-desktop-macos-x64-v1.0.${{ github.run_number }}.dmg\`
          - **iOS Framework**: 下载 \`lingxi-ios-framework-v1.0.${{ github.run_number }}.zip\`，解压后导入 Xcode 项目（P0 阶段为 framework，需手动创建 Xcode wrapper 工程）

          > 如已安装旧版本，可直接覆盖安装（签名一致）。
          > macOS 用户首次打开可能需要右键选择「打开」以绕过 Gatekeeper。" \
            release-assets/*
