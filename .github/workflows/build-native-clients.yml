name: Build Native Clients

on:
  push:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
      - '.github/workflows/build-native-clients.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
      - '.github/workflows/build-native-clients.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: lingxi-clients

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      LINGXI_VERSION_CODE: ${{ github.run_number }}
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download EdgeTAM-ONNX model (int8)
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import hf_hub_download
          import os, shutil
          repo = 'onnx-community/EdgeTAM-ONNX'
          out = 'lingxi-clients/androidApp/src/androidMain/assets/models/edgetam'
          os.makedirs(out, exist_ok=True)
          # List all onnx files
          from huggingface_hub import list_repo_files
          files = list_repo_files(repo)
          onnx_files = [f for f in files if f.startswith('onnx/') and f.endswith(('.onnx', '.onnx_data'))]
          print(f'Found ONNX files: {onnx_files}')
          # Download int8/quantized versions
          for f in onnx_files:
            if 'quantized' in f or 'int8' in f or 'q8' in f:
              print(f'Downloading {f}...')
              path = hf_hub_download(repo, f)
              # Rename to standard names
              basename = os.path.basename(f)
              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_int8.onnx' if basename.endswith('.onnx') else 'vision_encoder_int8.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_int8.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_int8.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Decode release keystore
        env:
          LINGXI_KEYSTORE_BASE64: ${{ secrets.LINGXI_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$LINGXI_KEYSTORE_BASE64" ]; then
            echo "ERROR: LINGXI_KEYSTORE_BASE64 secret is not configured."
            echo "Please generate a keystore and add it to GitHub Secrets:"
            echo "  keytool -genkeypair -v -keystore lingxi-release.jks -alias lingxi -keyalg RSA -keysize 4096 -validity 10000"
            echo "  base64 -w 0 lingxi-release.jks"
            exit 1
          fi
          echo "$LINGXI_KEYSTORE_BASE64" | base64 -d > /tmp/lingxi.keystore
          echo "Keystore decoded successfully"

      - name: Build Release APK
        env:
          LINGXI_KEYSTORE_PATH: /tmp/lingxi.keystore
          LINGXI_KEYSTORE_PASSWORD: ${{ secrets.LINGXI_KEYSTORE_PASSWORD }}
          LINGXI_KEY_ALIAS: ${{ secrets.LINGXI_KEY_ALIAS }}
          LINGXI_KEY_PASSWORD: ${{ secrets.LINGXI_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Rename APK with version
        run: |
          mkdir -p release-assets
          cp androidApp/build/outputs/apk/release/*.apk \
            release-assets/lingxi-android-v1.0.${{ github.run_number }}.apk
          echo "APK renamed:"
          ls -la release-assets/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-android-release
          path: lingxi-clients/release-assets/*.apk
          retention-days: 30

  build-desktop:
    name: Build Desktop MSI
    runs-on: windows-latest
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Download EdgeTAM-ONNX model (fp16)
        shell: bash
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import hf_hub_download, list_repo_files
          import os, shutil
          repo = 'onnx-community/EdgeTAM-ONNX'
          out = 'lingxi-clients/desktopApp/resources/models/edgetam'
          os.makedirs(out, exist_ok=True)
          files = list_repo_files(repo)
          onnx_files = [f for f in files if f.startswith('onnx/') and f.endswith(('.onnx', '.onnx_data'))]
          print(f'Found ONNX files: {onnx_files}')
          for f in onnx_files:
            if 'fp16' in f:
              print(f'Downloading {f}...')
              path = hf_hub_download(repo, f)
              basename = os.path.basename(f)
              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_fp16.onnx' if basename.endswith('.onnx') else 'vision_encoder_fp16.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_fp16.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_fp16.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Build Desktop MSI
        run: ./gradlew :desktopApp:packageReleaseMsi
        shell: bash

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-msi
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Build Desktop Exe (portable)
        run: ./gradlew :desktopApp:packageReleaseExe
        shell: bash

      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-exe
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/exe/*.exe
          if-no-files-found: error
          retention-days: 30

  build-desktop-macos-arm64:
    name: Build Desktop DMG (Apple Silicon)
    runs-on: macos-latest
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download EdgeTAM-ONNX model (fp16)
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import hf_hub_download, list_repo_files
          import os, shutil
          repo = 'onnx-community/EdgeTAM-ONNX'
          out = 'lingxi-clients/desktopApp/resources/models/edgetam'
          os.makedirs(out, exist_ok=True)
          files = list_repo_files(repo)
          onnx_files = [f for f in files if f.startswith('onnx/') and f.endswith(('.onnx', '.onnx_data'))]
          print(f'Found ONNX files: {onnx_files}')
          for f in onnx_files:
            if 'fp16' in f:
              print(f'Downloading {f}...')
              path = hf_hub_download(repo, f)
              basename = os.path.basename(f)
              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_fp16.onnx' if basename.endswith('.onnx') else 'vision_encoder_fp16.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_fp16.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_fp16.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Build Desktop DMG (Apple Silicon)
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-dmg-arm64
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-desktop-macos-intel:
    name: Build Desktop DMG (Intel)
    runs-on: macos-13
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download EdgeTAM-ONNX model (fp16)
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import hf_hub_download, list_repo_files
          import os, shutil
          repo = 'onnx-community/EdgeTAM-ONNX'
          out = 'lingxi-clients/desktopApp/resources/models/edgetam'
