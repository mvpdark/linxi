          print(f'Found ONNX files: {onnx_files}')
          for f in onnx_files:
            if 'fp16' in f:
              print(f'Downloading {f}...')
              path = hf_hub_download(repo, f)
              basename = os.path.basename(f)
              if 'encoder' in f or 'vision' in f:
                target = os.path.join(out, 'vision_encoder_fp16.onnx' if basename.endswith('.onnx') else 'vision_encoder_fp16.onnx_data')
              elif 'decoder' in f or 'mask' in f:
                target = os.path.join(out, 'prompt_mask_decoder_fp16.onnx' if basename.endswith('.onnx') else 'prompt_mask_decoder_fp16.onnx_data')
              else:
                target = os.path.join(out, basename)
              shutil.copy2(path, target)
              print(f'  -> {target} ({os.path.getsize(target)/(1024*1024):.1f} MB)')
          print('Model files:')
          for f in os.listdir(out):
            print(f'  {f}: {os.path.getsize(os.path.join(out, f))/(1024*1024):.1f} MB')
          "

      - name: Build Desktop DMG (Intel)
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-dmg-x64
          path: lingxi-clients/desktopApp/build/compose/binaries/main*/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS Framework
    if: false  # 暂时禁用，iOS P0 代码保留待 macOS 环境调试
    runs-on: macos-latest
    env:
      LINGXI_VERSION_NAME: "1.0.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework (shared + iosApp)
        run: |
          # 编译 shared 模块的 iOS Arm64 release framework
          ./gradlew :shared:linkReleaseFrameworkIosArm64
          # 编译 iosApp 模块的 iOS Arm64 release framework
          ./gradlew :iosApp:linkReleaseFrameworkIosArm64

      - name: Prepare iOS framework artifact
        run: |
          mkdir -p release-assets
          # 将 ComposeApp.framework 打包为 zip
          cd shared/build/bin/iosArm64/releaseFramework
          zip -ry "$GITHUB_WORKSPACE/lingxi-clients/release-assets/lingxi-ios-framework-v1.0.${{ github.run_number }}.zip" ComposeApp.framework
          cd "$GITHUB_WORKSPACE/lingxi-clients"
          echo "iOS framework zip:"
          ls -la release-assets/

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-ios-framework
          path: lingxi-clients/release-assets/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish to GitHub Releases
    needs: [build-android, build-desktop, build-desktop-macos-arm64]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # 固定文件名（不带版本号，每次覆盖）
          copy_asset() {
            local artifact_dir="$1"
            local pattern="$2"
            local output_name="$3"
            local label="$4"

            if [ ! -d "$artifact_dir" ]; then
              echo "✗ $label: directory $artifact_dir not found"
              return 0
            fi

            local found_file
            found_file=$(find "$artifact_dir" -name "$pattern" -type f | head -1)
            if [ -n "$found_file" ]; then
              cp "$found_file" "release-assets/$output_name"
              local size_mb
              size_mb=$(du -m "release-assets/$output_name" | cut -f1)
              echo "✓ $label: $output_name (${size_mb} MB)"
            else
              echo "✗ $label: no $pattern found in $artifact_dir"
            fi
          }

          copy_asset "artifacts/lingxi-android-release" "*.apk" "lingxi-android.apk" "Android APK"
          copy_asset "artifacts/lingxi-desktop-msi" "*.msi" "lingxi-windows.msi" "Windows MSI"
          copy_asset "artifacts/lingxi-desktop-exe" "*.exe" "lingxi-windows-portable.exe" "Windows EXE"
          copy_asset "artifacts/lingxi-desktop-dmg-arm64" "*.dmg" "lingxi-macos-arm64.dmg" "macOS ARM64 DMG"

          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Publish to GitHub Release (latest, always overwrite)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v1.0.${{ github.run_number }}"

          # 删除旧的 latest release（如果存在）
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # 创建新的 latest release（tag 固定为 latest，标题带版本号）
          gh release create latest \
            --title "灵犀 ${VERSION}" \
            --notes "## 灵犀 ${VERSION}

          **Commit:** ${{ github.sha }}
          **构建时间:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **版本号:** ${VERSION}

          ### 下载说明
          - **Android**: 下载 \`lingxi-android.apk\`
          - **Windows 安装版**: 下载 \`lingxi-windows.msi\`
          - **Windows 便携版**: 下载 \`lingxi-windows-portable.exe\`
          - **macOS Apple Silicon**: 下载 \`lingxi-macos-arm64.dmg\`

          > 每次构建都会覆盖此 release，始终只保留最新版本。" \
            release-assets/*
