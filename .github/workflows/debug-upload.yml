name: Debug Release Upload
on:
  push:
    paths:
      - '.github/workflows/debug-upload.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: gh version
        run: gh --version

      - name: Download real artifacts from run 29709447658
        uses: actions/download-artifact@v4
        with:
          name: lingxi-desktop-msi
          path: artifacts
          run-id: 29709447658
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create debug release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(gh release create "v0.0.0-debug" --title "debug" --notes "debug" 2>&1) && echo "create OK: $out" || echo "::error::create failed: $out"

      - name: Upload real MSI asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la artifacts/
          f=$(find artifacts -name '*.msi' | head -1)
          echo "found: $f size=$(du -m "$f" | cut -f1)MB"
          out=$(gh release upload "v0.0.0-debug" "$f" --clobber 2>&1) && echo "upload OK: $out" || echo "::error::upload failed: $out"

      - name: Cleanup debug release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v0.0.0-debug" --yes --cleanup-tag || true
