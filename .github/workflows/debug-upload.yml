name: Debug Release Upload
on:
  push:
    paths:
      - '.github/workflows/debug-upload.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepare dummy assets
        run: |
          mkdir -p debug-assets
          echo "small test" > debug-assets/small.txt
          dd if=/dev/zero of=debug-assets/large.bin bs=1M count=100

      - name: Create debug release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(gh release create "v0.0.0-debug" --title "debug" --notes "debug" 2>&1) && echo "create OK" || echo "::error::create failed: $out"

      - name: Upload small asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(gh release upload "v0.0.0-debug" debug-assets/small.txt --clobber 2>&1) && echo "small OK: $out" || echo "::error::small upload failed: $out"

      - name: Upload large asset (100MB)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(gh release upload "v0.0.0-debug" debug-assets/large.bin --clobber 2>&1) && echo "large OK: $out" || echo "::error::large upload failed: $out"

      - name: Cleanup debug release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v0.0.0-debug" --yes --cleanup-tag || true
