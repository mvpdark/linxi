name: Build Tauri Desktop

on:
  push:
    branches: [main]
    paths:
      - 'src/static/**'
      - 'frontend-tauri/**'
      - '.github/workflows/build-tauri.yml'
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend-tauri/src-tauri -> target

      - name: Install dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Clean dist/ build cache
        shell: bash
        run: |
          echo "=== Cleaning dist/ caches ==="
          rm -rf dist/ frontend-tauri/dist/
          echo "Cleaned dist/ directories"

      - name: Verify static resources (config.json + auth.js)
        shell: bash
        run: |
          echo "=== Verifying src/static/ contents ==="
          echo "--- config.json ---"
          if [ ! -f src/static/config.json ]; then
            echo '{"apiBase": "https://lx.mvpdark.top:8443"}' > src/static/config.json
            echo "Generated config.json"
          fi
          cat src/static/config.json
          echo ""
          echo "--- auth.js ---"
          if [ ! -f src/static/js/auth.js ]; then
            echo "ERROR: auth.js not found!"
            exit 1
          fi
          echo "auth.js exists ($(wc -l < src/static/js/auth.js) lines)"
          echo ""
          echo "--- frontendDist verification ---"
          echo "tauri.conf.json frontendDist:"
          grep frontendDist frontend-tauri/src-tauri/tauri.conf.json
          echo ""
          echo "--- src/static/ file listing ---"
          find src/static -maxdepth 2 -type f | head -30

      - name: Install Tauri CLI
        run: cd frontend-tauri && npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend-tauri
          tagName: tauri-v1.0.${{ github.run_number }}
          releaseName: '灵犀桌面端 (Tauri) v1.0.${{ github.run_number }}'
          releaseBody: |
            ## 灵犀桌面端 (Tauri Web 版)

            **Commit:** ${{ github.sha }}
            **版本号:** ${{ github.run_number }}

            ### 下载说明
            - **Windows 安装版 (.msi/.exe)**: 双击安装
            - **Linux AppImage**: 下载后 `chmod +x` 即可运行

            > 已内置最新 config.json 和 auth.js
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
