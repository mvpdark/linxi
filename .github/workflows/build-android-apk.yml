name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/static/**'
      - 'frontend-capacitor/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate config.json
        run: |
          mkdir -p src/static
          echo '{"apiBase": "https://lx.mvpdark.top:8443"}' > src/static/config.json

      - name: Install Capacitor dependencies
        run: cd frontend-capacitor && npm install

      - name: Sync Capacitor Android
        run: cd frontend-capacitor && npx cap sync android

      - name: Build Debug APK
        run: |
          cd frontend-capacitor/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-debug-apk
          path: frontend-capacitor/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
