name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/static/**'
      - 'frontend-capacitor/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate config.json
        run: |
          mkdir -p src/static
          echo '{"apiBase": "https://lx.mvpdark.top:8443"}' > src/static/config.json

      - name: Install Capacitor dependencies
        run: cd frontend-capacitor && npm install

      - name: Sync Capacitor Android
        run: cd frontend-capacitor && npx cap sync android

      - name: Build Release APK
        env:
          LINGXI_KEYSTORE_PATH: ${{ github.workspace }}/lingxi.keystore
          LINGXI_KEYSTORE_PASSWORD: ${{ secrets.LINGXI_KEYSTORE_PASSWORD || 'android' }}
          LINGXI_KEY_ALIAS: ${{ secrets.LINGXI_KEY_ALIAS || 'lingxi' }}
          LINGXI_KEY_PASSWORD: ${{ secrets.LINGXI_KEY_PASSWORD || 'android' }}
        run: |
          # 生成签名密钥（如果 GitHub Secrets 未配置，则使用默认 debug 密钥）
          if [ -n "${{ secrets.LINGXI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.LINGXI_KEYSTORE_BASE64 }}" | base64 -d > lingxi.keystore
          else
            keytool -genkeypair -v -keystore lingxi.keystore -alias lingxi \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass android -keypass android \
              -dname "CN=Lingxi, OU=Dev, O=MvpDark, L=Beijing, ST=Beijing, C=CN"
          fi

          cd frontend-capacitor/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          cp frontend-capacitor/android/app/build/outputs/apk/release/app-release.apk \
             lingxi-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-apk
          path: frontend-capacitor/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 灵犀 v1.0.${{ github.run_number }}
          body: |
            ## 灵犀 Android APK（Release 完整版）

            **版本**: v1.0.${{ github.run_number }}
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}

            ### 下载说明
            - 点击下方 `lingxi-${{ github.run_number }}.apk` 下载安装包
            - Release 签名版本，已包含 SAM 2 前端本地分割（EdgeTAM）
            - 安装时需开启"允许未知来源"
            - 后端地址: https://lx.mvpdark.top:8443

            ### 最新特性
            - 用户登录与计费系统（余额熔断）
            - SAM 2 前端本地分割（EdgeTAM + transformers.js）
            - 用户面板（余额、历史记录）
            - Let's Encrypt HTTPS 证书
            - Cloudflare DDNS 自动同步
          files: lingxi-${{ github.run_number }}.apk
          prerelease: false
