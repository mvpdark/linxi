name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/static/**'
      - 'frontend-capacitor/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate config.json
        run: |
          mkdir -p src/static
          echo '{"apiBase": "https://lx.mvpdark.top:8443"}' > src/static/config.json

      - name: Install Capacitor dependencies
        run: cd frontend-capacitor && npm install

      - name: Sync Capacitor Android
        run: cd frontend-capacitor && npx cap sync android

      - name: Build Debug APK
        run: |
          cd frontend-capacitor/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          cp frontend-capacitor/android/app/build/outputs/apk/debug/app-debug.apk \
             lingxi-${{ github.run_number }}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-debug-apk
          path: frontend-capacitor/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 灵犀 v1.0.${{ github.run_number }}
          body: |
            ## 灵犀 Android APK

            **版本**: v1.0.${{ github.run_number }}
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}

            ### 下载说明
            - 点击下方 `lingxi-${{ github.run_number }}-debug.apk` 下载安装包
            - 这是 Debug 版本，安装时需开启"允许未知来源"
            - 后端地址: https://lx.mvpdark.top:8443

            ### 最新特性
            - 用户登录与计费系统
            - Let's Encrypt HTTPS 证书
            - Cloudflare DDNS 自动同步
            - 灵犀图标 (Resonant Silence 设计)
          files: lingxi-${{ github.run_number }}-debug.apk
          prerelease: false
