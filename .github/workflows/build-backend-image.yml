# ===========================================================================
# 灵犀后端 Docker 镜像构建 & 推送
#
# 触发条件：push 到 main 且后端相关文件有变更
# 推送目标：ghcr.io/mvpdark/lingxi-backend:latest
#           ghcr.io/mvpdark/lingxi-backend:1.0.{run_number}
#
# Unraid 更新方式：
#   docker pull ghcr.io/mvpdark/lingxi-backend:latest
#   然后在 Unraid UI 重建容器（或 docker stop && docker rm && docker run ...）
# ===========================================================================
name: Build Backend Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'backend/**'
      - 'docker/**'
      - 'Dockerfile'
      - 'alembic/**'
      - 'alembic.ini'

  # 允许手动触发
  workflow_dispatch:

env:
  IMAGE_NAME: lingxi-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=1.0.${{ github.run_number }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 镜像构建不需要密钥，运行时全部通过环境变量/挂载卷注入
          build-args: |
            BUILDKIT_INLINE_CACHE=1
