# Alembic 数据库迁移配置
# 配合 SQLAlchemy 2.0 异步引擎（asyncpg）使用，迁移环境见 alembic/env.py

[alembic]
# 迁移脚本目录
script_location = alembic

# 将项目根目录加入 sys.path，确保 env.py 能导入 src.db.models
prepend_sys_path = .

# 迁移版本文件命名模板：日期时间_版本号_说明
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 数据库连接串不写死在此文件中，
# 由 alembic/env.py 从环境变量 DATABASE_URL 读取后注入
# （格式：postgresql+asyncpg://user:pass@host:port/db）
# sqlalchemy.url =

[post_write_hooks]
# 迁移脚本生成后的钩子（当前未启用）

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
