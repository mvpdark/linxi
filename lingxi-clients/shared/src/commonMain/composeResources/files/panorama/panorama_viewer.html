<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panorama Viewer</title>
<link rel="stylesheet" href="pannellum.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#viewer { width: 100vw; height: 100vh; }
.hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.8); font-size: 13px; font-family: -apple-system, sans-serif;
  background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 16px;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="viewer"></div>
<div class="hint" id="hint">拖动画面查看 360 视角</div>
<!-- panorama_data.js 设置 window.__panoramaBase64，必须在 pannellum.js 之前加载 -->
<script src="panorama_data.js"></script>
<script src="pannellum.js"></script>
<script>
var viewer = null;

// base64 转 blob: URL（blob: URL 是同源的，XHR 可以可靠加载；
// file:// URL 在 Android WebView 中 XHR responseType="blob" 返回 null，导致白屏）
function base64ToBlobUrl(base64) {
  var pure = base64;
  if (pure.indexOf(',') !== -1) {
    pure = pure.split(',')[1];
  }
  var bytes = atob(pure);
  var arr = new Uint8Array(bytes.length);
  for (var i = 0; i < bytes.length; i++) {
    arr[i] = bytes.charCodeAt(i);
  }
  return URL.createObjectURL(new Blob([arr], { type: 'image/jpeg' }));
}

// 由 Kotlin 调用：从 base64 数据加载全景图
window.__loadPanoramaFromBase64 = function() {
  if (typeof pannellum === 'undefined') {
    document.getElementById('hint').textContent = '全景查看器加载失败';
    console.error('pannellum undefined');
    return;
  }
  if (!window.__panoramaBase64) {
    document.getElementById('hint').textContent = '全景图数据未加载';
    console.error('window.__panoramaBase64 not set');
    return;
  }
  try {
    var blobUrl = base64ToBlobUrl(window.__panoramaBase64);
    console.log('Created blob URL: ' + blobUrl.substring(0, 50) + '...');
    if (viewer) { viewer.destroy(); viewer = null; }
    var el = document.getElementById('viewer');
    if (!el) return;
    viewer = pannellum.viewer(el, {
      type: 'equirectangular',
      panorama: blobUrl,
      autoLoad: true,
      showZoomCtrl: false,
      showFullscreenCtrl: true,
      compass: false,
      minHfov: 50,
      maxHfov: 120,
      friction: 0.15
    });
    viewer.on('loadError', function() {
      document.getElementById('hint').textContent = '全景图加载失败';
      console.error('pannellum loadError');
    });
    viewer.on('error', function(e) {
      document.getElementById('hint').textContent = '全景图加载失败';
      console.error('pannellum error: ' + JSON.stringify(e));
    });
    el.addEventListener('mousedown', hideHint, { once: true });
    el.addEventListener('touchstart', hideHint, { once: true });
  } catch (e) {
    document.getElementById('hint').textContent = '全景图加载失败: ' + e.message;
    console.error('Exception: ' + e.message);
  }
};

// 保留原始接口（直接传 URL），用于后备
window.__loadPanorama = function(url) {
  if (typeof pannellum === 'undefined') {
    document.getElementById('hint').textContent = '全景查看器加载失败';
    return;
  }
  try {
    if (viewer) { viewer.destroy(); viewer = null; }
    var el = document.getElementById('viewer');
    if (!el) return;
    viewer = pannellum.viewer(el, {
      type: 'equirectangular',
      panorama: url,
      autoLoad: true,
      showZoomCtrl: false,
      showFullscreenCtrl: true,
      compass: false,
      minHfov: 50,
      maxHfov: 120,
      friction: 0.15
    });
    viewer.on('loadError', function() {
      document.getElementById('hint').textContent = '全景图加载失败';
    });
    viewer.on('error', function() {
      document.getElementById('hint').textContent = '全景图加载失败';
    });
    el.addEventListener('mousedown', hideHint, { once: true });
    el.addEventListener('touchstart', hideHint, { once: true });
  } catch (e) {
    document.getElementById('hint').textContent = '全景图加载失败: ' + e.message;
  }
};

function hideHint() {
  var h = document.getElementById('hint');
  if (h) h.style.display = 'none';
}

window.__destroyPanorama = function() {
  if (viewer) { viewer.destroy(); viewer = null; }
};

// 页面加载完成后自动从 base64 初始化全景图
window.addEventListener('load', function() {
  console.log('Page loaded, __panoramaBase64 available: ' + (!!window.__panoramaBase64));
  if (window.__panoramaBase64) {
    window.__loadPanoramaFromBase64();
  }
});
</script>
</body>
</html>
