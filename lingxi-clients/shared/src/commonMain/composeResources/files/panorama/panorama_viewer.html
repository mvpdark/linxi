<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- user-scalable=no：禁用 WebView 系统级缩放，避免与 Pannellum 自己的双指缩放冲突 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panorama Viewer</title>
<link rel="stylesheet" href="pannellum.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#viewer { width: 100vw; height: 100vh; }
.hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.85); font-size: 13px; font-family: -apple-system, sans-serif;
  background: rgba(0,0,0,0.45); padding: 6px 14px; border-radius: 16px;
  pointer-events: none; z-index: 10; max-width: 86vw; text-align: center;
}
/* 错误态：红色调，长文本可换行 */
.hint.error {
  background: rgba(140,20,20,0.75); border-radius: 10px;
  white-space: normal; line-height: 1.5;
}
</style>
</head>
<body>
<div id="viewer"></div>
<div class="hint" id="hint">拖动画面查看 360 视角</div>
<!--
  双平台加载机制：
  - Android：本文件仅作模板，Kotlin 侧将下方三处外部引用原位替换为内联内容
    （CSS / window.__panoramaConfig={url:"data:..."} / pannellum.js），
    经 loadDataWithBaseURL 一次性加载自包含 HTML，加载后零网络/文件请求。
  - Desktop：Kotlin 侧把本文件 + pannellum.js/css + panorama.jpg 写入临时目录，
    并生成 panorama_data.js（仅一行 window.__panoramaConfig={url:"panorama.jpg"}），
    JCEF 以 file:// + --allow-file-access-from-files 加载，相对路径取图。
  加载顺序必须是 panorama_data.js 在前、pannellum.js 在后、内联脚本最后。
-->
<script src="panorama_data.js"></script>
<script src="pannellum.js"></script>
<script>
var viewer = null;

/* ---------- 与 Kotlin 的桥（addJavascriptInterface("AndroidBridge")） ----------
 * 桥不存在时（例如桌面浏览器调试）自动降级为 console，保证页面可独立调试。 */
function bridgeLog(msg) {
  console.log(msg);
  if (window.AndroidBridge && window.AndroidBridge.log) { window.AndroidBridge.log(msg); }
}
function bridgeLoaded() {
  bridgeLog('panorama rendered');
  if (window.AndroidBridge && window.AndroidBridge.onPanoramaLoaded) {
    window.AndroidBridge.onPanoramaLoaded();
  }
}
function bridgeError(msg) {
  console.error(msg);
  var h = document.getElementById('hint');
  if (h) { h.textContent = msg; h.className = 'hint error'; }
  if (window.AndroidBridge && window.AndroidBridge.onPanoramaError) {
    window.AndroidBridge.onPanoramaError(msg);
  }
}

/* ---------- WebGL 探测 ----------
 * Pannellum 强依赖 WebGL；不支持时旧版只会黑屏无任何提示，
 * 这里显式探测并给出中文错误（部分模拟器/老旧 WebView/关闭硬件加速的设备）。 */
function isWebGLSupported() {
  try {
    var canvas = document.createElement('canvas');
    return !!(window.WebGLRenderingContext &&
      (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
  } catch (e) {
    return false;
  }
}

function hideHint() {
  var h = document.getElementById('hint');
  if (h) h.style.display = 'none';
}

/* ---------- 加载全景图 ----------
 * url 来源取决于平台：Android 为 data: URL（Pannellum 直接用 Image 解码，
 * 不经 XHR，无同源限制）；Desktop 为同源相对路径 panorama.jpg（Pannellum
 * 内部 XHR 取图，file:// 下依赖 --allow-file-access-from-files）。 */
window.__loadPanorama = function(url) {
  if (typeof pannellum === 'undefined') {
    bridgeError('全景组件加载失败（pannellum.js 未加载）');
    return;
  }
  if (!url) {
    bridgeError('全景图数据未加载');
    return;
  }
  try {
    if (viewer) { viewer.destroy(); viewer = null; }
    var el = document.getElementById('viewer');
    if (!el) { bridgeError('全景容器不存在'); return; }
    bridgeLog('init pannellum, url=' + url);
    viewer = pannellum.viewer(el, {
      type: 'equirectangular',
      panorama: url,
      autoLoad: true,
      showZoomCtrl: false,
      /* WebView 未实现 onShowCustomView，全屏按钮点击无效甚至卡死，直接隐藏 */
      showFullscreenCtrl: false,
      compass: false,
      minHfov: 50,
      maxHfov: 120,
      friction: 0.15,
      orientationOnByDefault: false
    });
    /* pannellum 的 load 事件 = 纹理上传完成，此时才认为渲染成功并通知 Kotlin 关闭看门狗 */
    viewer.on('load', function() { bridgeLoaded(); });
    /* 2.5.x 版本图片解码/XHR 失败走 error；个别版本走 loadError，两个都注册 */
    viewer.on('error', function() { bridgeError('全景图渲染失败（图片解码或加载错误）'); });
    viewer.on('loadError', function() { bridgeError('全景图加载失败'); });
    el.addEventListener('mousedown', hideHint, { once: true });
    el.addEventListener('touchstart', hideHint, { once: true });
  } catch (e) {
    bridgeError('全景图加载失败: ' + (e && e.message ? e.message : e));
  }
};

window.__destroyPanorama = function() {
  if (viewer) { viewer.destroy(); viewer = null; }
};

/* ---------- 入口 ----------
 * load 事件触发时 panorama_data.js / pannellum.js 均已同步执行完毕。 */
window.addEventListener('load', function() {
  bridgeLog('page loaded');
  if (!isWebGLSupported()) {
    bridgeError('当前设备不支持 WebGL，无法显示 360° 全景');
    return;
  }
  var cfg = window.__panoramaConfig;
  if (cfg && cfg.url) {
    window.__loadPanorama(cfg.url);
  } else {
    bridgeError('全景图数据未加载');
  }
});
</script>
</body>
</html>
