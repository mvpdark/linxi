name: Build Native Clients

on:
  push:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
  pull_request:
    branches: [main]
    paths:
      - 'lingxi-clients/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: lingxi-clients

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-android-debug
          path: lingxi-clients/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (if secrets available)
        if: env.LINGXI_KEYSTORE_BASE64 != ''
        env:
          LINGXI_KEYSTORE_BASE64: ${{ secrets.LINGXI_KEYSTORE_BASE64 }}
          LINGXI_KEYSTORE_PASSWORD: ${{ secrets.LINGXI_KEYSTORE_PASSWORD }}
          LINGXI_KEY_ALIAS: ${{ secrets.LINGXI_KEY_ALIAS }}
          LINGXI_KEY_PASSWORD: ${{ secrets.LINGXI_KEY_PASSWORD }}
        run: |
          echo "$LINGXI_KEYSTORE_BASE64" | base64 -d > /tmp/lingxi.keystore
          export LINGXI_KEYSTORE_PATH=/tmp/lingxi.keystore
          ./gradlew :androidApp:assembleRelease

      - name: Upload Release APK
        if: env.LINGXI_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-android-release
          path: lingxi-clients/androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

  build-desktop:
    name: Build Desktop MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build Desktop MSI
        run: ./gradlew :desktopApp:packageReleaseMsi
        shell: bash

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-msi
          path: lingxi-clients/desktopApp/build/compose/binaries/main/msi/*.msi
          retention-days: 30

      - name: Build Desktop Exe (portable)
        run: ./gradlew :desktopApp:packageReleaseExe
        shell: bash

      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: lingxi-desktop-exe
          path: lingxi-clients/desktopApp/build/compose/binaries/main/exe/*.exe
          retention-days: 30
